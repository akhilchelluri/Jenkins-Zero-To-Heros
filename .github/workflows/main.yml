name: Docker Build Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-node-app .

      - name: Run Docker Container
        run: docker run my-node-app
