name: My First GitHub Actions Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'my-first-pipeline/**'
      - '.github/workflows/my-first-pipeline.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'my-first-pipeline/**'
      - '.github/workflows/my-first-pipeline.yml'

jobs:
  test-node-version:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: my-first-pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 14
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Verify Node version
        run: node --version
